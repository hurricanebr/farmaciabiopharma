<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Venda — Biopharma Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/api/get-config"></script>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="/admin/dashboard" class="brand" aria-label="Biopharma Admin">
        <img src="/banner_site.png" alt="Biopharma Farmácia" class="brand__img">
      </a>
      <ul class="navbar__menu">
        <li><a href="/admin/dashboard" class="nav-link">Dashboard</a></li>
        <li><a href="/admin/boletos" class="nav-link">Boletos</a></li>
        <li><a href="/admin/vendas" class="nav-link active">Vendas</a></li>
        <li><a href="/admin/relatorio" class="nav-link">Relatório</a></li>
        <li class="navbar__menu-cta">
          <button class="btn-signout" onclick="signOut()">Sair</button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="page">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <a href="/admin/vendas" style="color:#64748b;text-decoration:none;font-size:.875rem;">← Voltar</a>
      <h1 class="page-title" style="margin-bottom:0">Registrar Venda</h1>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label for="data">Data da venda</label>
        <input type="date" id="data" required />
      </div>
      <div class="form-group">
        <label for="valor">Total vendido (R$)</label>
        <input type="number" id="valor" step="0.01" min="0.01" placeholder="0,00" required />
      </div>
      <div class="form-group">
        <label for="observacao">Observação (opcional)</label>
        <textarea id="observacao" placeholder="Ex: semana do Dia das Mães, promoção dipirona..."></textarea>
      </div>
      <button type="button" class="btn btn-success" style="width:100%;padding:12px;" onclick="salvarVenda()" id="saveBtn">
        SALVAR VENDA
      </button>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
  <script>
    async function init() {
      await requireAuth();
      document.getElementById('data').value = todayISO();
    }

    async function salvarVenda() {
      const data = document.getElementById('data').value;
      const valor = document.getElementById('valor').value;
      const observacao = document.getElementById('observacao').value.trim();

      if (!data || !valor || parseFloat(valor) <= 0) {
        alert('Preencha a data e um valor maior que zero.');
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.textContent = 'Salvando...';
      btn.disabled = true;

      const { error } = await db.from('vendas').insert({
        data,
        valor: parseFloat(valor),
        observacao: observacao || null
      });

      if (error) {
        alert('Erro ao salvar. Tente novamente.');
        btn.textContent = 'SALVAR VENDA';
        btn.disabled = false;
        return;
      }

      window.location.href = '/admin/dashboard';
    }

    init();
  </script>
</body>
</html>
