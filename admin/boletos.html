<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boletos — Biopharma Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/api/get-config"></script>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="/admin/dashboard" class="brand" aria-label="Biopharma Admin">
        <img src="/banner_site.png" alt="Biopharma Farmácia" class="brand__img">
      </a>
      <ul class="navbar__menu">
        <li><a href="/admin/dashboard" class="nav-link">Dashboard</a></li>
        <li><a href="/admin/boletos" class="nav-link active">Boletos</a></li>
        <li><a href="/admin/vendas" class="nav-link">Vendas</a></li>
        <li><a href="/admin/relatorio" class="nav-link">Relatório</a></li>
        <li class="navbar__menu-cta">
          <button class="btn-signout" onclick="signOut()">Sair</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Modal de edição -->
  <div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,53,88,.45);z-index:1000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:16px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 50px rgba(0,53,88,.25);">
      <h2 style="font-size:1.2rem;font-weight:700;color:#003558;margin-bottom:24px;">Editar Boleto</h2>
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label for="editFornecedor">Fornecedor</label>
        <input type="text" id="editFornecedor" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="editValor">Valor (R$)</label>
          <input type="number" id="editValor" step="0.01" min="0" required />
        </div>
        <div class="form-group">
          <label for="editVencimento">Vencimento</label>
          <input type="date" id="editVencimento" required />
        </div>
      </div>
      <div class="form-group">
        <label for="editDescricao">Descrição</label>
        <input type="text" id="editDescricao" />
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-blue" onclick="salvarEdicao()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h1 class="page-title" style="margin-bottom:0">Boletos</h1>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="exportCSV()">⬇ CSV</button>
        <a href="/admin/boletos/novo" class="btn btn-primary">+ Adicionar Boleto</a>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn" onclick="setFilter('today',this)">Hoje</button>
      <button class="filter-btn" onclick="setFilter('week',this)">Esta semana</button>
      <button class="filter-btn active" onclick="setFilter('month',this)">Este mês</button>
      <button class="filter-btn" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('custom',this)">Personalizado</button>
      <div class="filter-custom-group" id="customGroup">
        <input type="date" id="customStart" />
        <span>até</span>
        <input type="date" id="customEnd" />
        <button class="btn btn-blue btn-sm" onclick="applyCustomFilter()">Aplicar</button>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <input type="text" id="searchInput" placeholder="Buscar por fornecedor ou descrição..."
        style="width:100%;max-width:360px;padding:9px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:.875rem;font-family:inherit;color:#333;transition:border-color .22s ease;"
        oninput="filterAndRender()" />
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fornecedor</th>
              <th>Valor</th>
              <th>Vencimento</th>
              <th>Status</th>
              <th>Descrição</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="boletosTableBody">
            <tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="paginationBar" style="display:flex;align-items:center;justify-content:space-between;padding:12px 4px 0;font-size:.875rem;color:#595959;"></div>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
  <script>
    let currentFilter = 'month';
    let allBoletos = [];
    let currentPage = 1;
    const PAGE_SIZE = 10;

    async function init() {
      await requireAuth();
      await loadBoletos();
    }

    function setFilter(period, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = period;
      const customGroup = document.getElementById('customGroup');
      if (period === 'custom') { customGroup.classList.add('visible'); return; }
      customGroup.classList.remove('visible');
      loadBoletos();
    }

    function applyCustomFilter() {
      const start = document.getElementById('customStart').value;
      const end = document.getElementById('customEnd').value;
      if (!start || !end) { showToast('Selecione as duas datas.', 'error'); return; }
      loadBoletos(start, end);
    }

    async function loadBoletos(customStart, customEnd) {
      setTableLoading('boletosTableBody', 6);
      let query = db.from('boletos').select('*').order('vencimento');
      if (currentFilter !== 'all') {
        const range = getDateRange(currentFilter, customStart, customEnd);
        query = query.gte('vencimento', range.start).lte('vencimento', range.end);
      }
      const { data, error } = await query;
      const tbody = document.getElementById('boletosTableBody');
      if (error) { handleDbError(error); return; }
      if (!data || !data.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px;">Nenhum boleto encontrado.</td></tr>';
        const bar = document.getElementById('paginationBar');
        if (bar) bar.innerHTML = '';
        return;
      }
      allBoletos = data;
      currentPage = 1;
      renderTable(data);
    }

    function renderTable(data) {
      const today = todayISO();
      const tbody = document.getElementById('boletosTableBody');
      const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
      currentPage = Math.min(currentPage, totalPages);
      const slice = data.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
      tbody.innerHTML = slice.map(b => {
        const badgeClass = b.pago_em ? 'pago' : (b.vencimento < today ? 'vencido' : 'pendente');
        const badgeLabel = b.pago_em ? 'PAGO' : (b.vencimento < today ? 'VENCIDO' : 'PENDENTE');
        const pagoBtn = b.pago_em
          ? `<span style="color:#94a3b8;font-size:.8rem;">Pago ${formatDateBR(b.pago_em)}</span>`
          : `<button class="btn-pago" onclick="marcarPago('${b.id}',this)">PAGO</button>`;
        const imgBtn = b.url_imagem
          ? `<a href="${b.url_imagem}" target="_blank" class="btn btn-secondary btn-sm">Ver</a>`
          : '';
        return `<tr>
          <td>${b.fornecedor}</td>
          <td>${formatCurrency(b.valor)}</td>
          <td>${formatDateBR(b.vencimento)}</td>
          <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
          <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${b.descricao || ''}">${b.descricao || '—'}</td>
          <td style="white-space:nowrap;display:flex;gap:6px;align-items:center;">
            ${pagoBtn}
            ${imgBtn}
            <button class="btn btn-secondary btn-sm" onclick="abrirEdicao('${b.id}')">Editar</button>
            <button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;border:none;" onclick="excluirBoleto('${b.id}','${b.fornecedor.replace(/'/g,"\\'")}')">Excluir</button>
          </td>
        </tr>`;
      }).join('');

      const bar = document.getElementById('paginationBar');
      if (!bar) return;
      if (totalPages <= 1) { bar.innerHTML = ''; return; }
      bar.innerHTML = `
        <span>${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE, data.length)} de ${data.length}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-secondary btn-sm" onclick="changePage(-1)" ${currentPage===1?'disabled':''}>‹ Anterior</button>
          <button class="btn btn-secondary btn-sm" onclick="changePage(1)" ${currentPage===totalPages?'disabled':''}>Próxima ›</button>
        </div>`;
    }

    function changePage(delta) {
      currentPage += delta;
      const q = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
      const filtered = q
        ? allBoletos.filter(b => (b.fornecedor||'').toLowerCase().includes(q) || (b.descricao||'').toLowerCase().includes(q))
        : allBoletos;
      renderTable(filtered);
    }

    function filterAndRender() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = q
        ? allBoletos.filter(b => (b.fornecedor||'').toLowerCase().includes(q) || (b.descricao||'').toLowerCase().includes(q))
        : allBoletos;
      currentPage = 1;
      renderTable(filtered);
    }

    async function marcarPago(id, btn) {
      btn.textContent = 'Salvando...';
      btn.disabled = true;
      const { error } = await db.from('boletos').update({ pago_em: todayISO() }).eq('id', id);
      if (error) { handleDbError(error); btn.textContent = 'PAGO'; btn.disabled = false; return; }
      showToast('Boleto marcado como pago!', 'success');
      await loadBoletos();
    }

    function abrirEdicao(id) {
      const b = allBoletos.find(x => x.id === id);
      if (!b) return;
      document.getElementById('editId').value = b.id;
      document.getElementById('editFornecedor').value = b.fornecedor;
      document.getElementById('editValor').value = b.valor;
      document.getElementById('editVencimento').value = b.vencimento;
      document.getElementById('editDescricao').value = b.descricao || '';
      const modal = document.getElementById('editModal');
      modal.style.display = 'flex';
      document.getElementById('editFornecedor').focus();
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    async function salvarEdicao() {
      const id = document.getElementById('editId').value;
      const fornecedor = document.getElementById('editFornecedor').value.trim();
      const valor = parseFloat(document.getElementById('editValor').value);
      const vencimento = document.getElementById('editVencimento').value;
      const descricao = document.getElementById('editDescricao').value.trim();
      if (!fornecedor || !valor || !vencimento) { showToast('Preencha todos os campos obrigatórios.', 'error'); return; }
      const { error } = await db.from('boletos').update({ fornecedor, valor, vencimento, descricao }).eq('id', id);
      if (error) { handleDbError(error); return; }
      showToast('Boleto salvo com sucesso!', 'success');
      closeModal();
      await loadBoletos();
    }

    async function excluirBoleto(id, fornecedor) {
      if (!await showConfirm(`Excluir o boleto de "${fornecedor}"?\n\nEssa ação não pode ser desfeita.`, 'Excluir')) return;
      const { error } = await db.from('boletos').delete().eq('id', id);
      if (error) { handleDbError(error); return; }
      showToast('Boleto excluído.', 'info');
      await loadBoletos();
    }

    function exportCSV() {
      if (!allBoletos.length) { showToast('Nenhum dado para exportar.', 'info'); return; }
      const rows = [['Fornecedor','Valor','Vencimento','Status','Descricao']];
      const today = todayISO();
      allBoletos.forEach(b => {
        const status = b.pago_em ? 'PAGO' : (b.vencimento < today ? 'VENCIDO' : 'PENDENTE');
        rows.push([b.fornecedor, b.valor, b.vencimento, status, b.descricao || '']);
      });
      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'}));
      a.download = `boletos-${todayISO()}.csv`;
      a.click();
    }

    // Fechar modal ao clicar fora
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ESC fecha o modal
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('editModal').style.display === 'flex') {
        closeModal();
      }
    });

    init();
  </script>
</body>
</html>
